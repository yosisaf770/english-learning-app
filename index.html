<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Master 500 - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%); margin: 0; padding: 0; overflow: hidden; height: 100vh; touch-action: manipulation; }
        .vocab-card { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; backface-visibility: hidden; }
        .vocab-card.is-flipped { transform: rotateY(180deg); }
        .vocab-card-back { transform: rotateY(180deg); backface-visibility: hidden; }
        .btn-animate { transition: transform 0.1s; }
        .btn-animate:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const WORD_LIST = [
            { word: "Analyze", translation: "לנתח", phonetic: "אֶ-נָ-לַאייז" },
            { word: "Approach", translation: "גישה", phonetic: "אֶ-פְּרוֹ-טְשׁ" },
            { word: "Appropriate", translation: "מתאים", phonetic: "אֶ-פְּרוֹ-פְּרִי-אֵייט" },
            { word: "Available", translation: "זמין", phonetic: "אֶ-ווֵי-לָ-בְּל" },
            { word: "Benefit", translation: "תועלת", phonetic: "בֶּ-נֶ-פִיט" },
            { word: "Category", translation: "קטגוריה", phonetic: "קָ-טֶ-גוֹ-רִי" },
            { word: "Community", translation: "קהילה", phonetic: "קוֹ-מְיוּ-נִי-טִי" },
            { word: "Complex", translation: "מורכב", phonetic: "קוֹם-פְּלֶקְס" },
            { word: "Concept", translation: "מושג", phonetic: "קוֹן-סֶפְּט" },
            { word: "Conclusion", translation: "מסקנה", phonetic: "קוֹן-קְלוּ-זֶ'ן" },
            { word: "Significant", translation: "משמעותי", phonetic: "סִיג-נִי-פִי-קֶנְט" },
            { word: "Identify", translation: "לזהות", phonetic: "איי-דֶנ-טִי-פַאיי" },
            { word: "Establish", translation: "לבסס", phonetic: "אֶ-סְטָ-בְּלִישׁ" },
            { word: "Focus", translation: "מיקוד", phonetic: "פוֹ-קוּס" },
            { word: "Improve", translation: "לשפר", phonetic: "אִים-פְּרוּב" },
            { word: "Evidence", translation: "הוכחה", phonetic: "אֶ-ווִי-דֶנְס" },
            { word: "Environment", translation: "סביבה", phonetic: "אֶנ-ווַיי-רוֹ-מֶנְט" },
            { word: "Acquire", translation: "לרכוש", phonetic: "אֶ-קְוַואייר" },
            { word: "Capacity", translation: "יכולת", phonetic: "קָ-פָּ-סִי-טִי" },
            { word: "Diverse", translation: "מגוון", phonetic: "דַאי-ווֶרְס" },
            { word: "Enhance", translation: "לשפר", phonetic: "אֶנ-הֶנְס" },
            { word: "Revenue", translation: "הכנסות", phonetic: "רֶ-ווֶ-נְיוּ" },
            { word: "Academic", translation: "אקדמי", phonetic: "אֶ-קָ-דֶ-מִיק" },
            { word: "Behavior", translation: "התנהגות", phonetic: "בִּי-הֵיי-ווְיֶר" },
            { word: "Believe", translation: "להאמין", phonetic: "בִּי-לִיב" },
            { word: "Decision", translation: "החלטה", phonetic: "דִי-סִי-זֶ'ן" },
            { word: "Explain", translation: "להסביר", phonetic: "אִק-סְפְּלֵיין" },
            { word: "Knowledge", translation: "ידע", phonetic: "נוֹ-לֶג'" },
            { word: "Language", translation: "שפה", phonetic: "לֶנ-גְוִו-ג'" },
            { word: "Professional", translation: "מקצועי", phonetic: "פְּרוֹ-פֶ-שֶׁ-נָל" },
            { word: "Solution", translation: "פתרון", phonetic: "סוֹ-לוּ-שֶׁן" },
            { word: "Update", translation: "עדכון", phonetic: "אֲפּ-דֵייט" }
            // הרשימה המלאה של 500 המילים
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [learnedWords, setLearnedWords] = useState([]);
            const [sessionWords, setSessionWords] = useState([]);
            const [isFinished, setIsFinished] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('vocab_master_pro_v1') || '[]');
                setLearnedWords(saved);
                const remaining = WORD_LIST.filter(w => !saved.includes(w.word));
                setSessionWords(remaining);
                if (remaining.length === 0 && WORD_LIST.length > 0) setIsFinished(true);
                lucide.createIcons();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [isFlipped, isFinished, sessionWords]);

            const filteredWords = useMemo(() => {
                return sessionWords.filter(w => w.word.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [sessionWords, searchTerm]);

            const currentWordData = filteredWords[currentIndex];

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    if (currentIndex < filteredWords.length - 1) {
                        setCurrentIndex(currentIndex + 1);
                    } else {
                        setCurrentIndex(0);
                    }
                }, 100);
            };

            const handleMarkAsLearned = () => {
                if (!currentWordData) return;
                const newLearned = [...learnedWords, currentWordData.word];
                setLearnedWords(newLearned);
                localStorage.setItem('vocab_master_pro_v1', JSON.stringify(newLearned));
                const updated = sessionWords.filter(w => w.word !== currentWordData.word);
                setSessionWords(updated);
                setIsFlipped(false);
                if (updated.length === 0) {
                    setIsFinished(true);
                } else {
                    if (currentIndex >= updated.length) setCurrentIndex(0);
                }
            };

            // פונקציה חכמה לחישוב גודל הטקסט באנגלית
            const getWordFontSize = (word) => {
                if (word.length > 12) return 'text-4xl';
                if (word.length > 9) return 'text-5xl';
                return 'text-6xl';
            };

            if (isFinished) return (
                <div class="h-full flex items-center justify-center p-6 text-center">
                    <div class="bg-white/90 backdrop-blur-sm p-12 rounded-3xl card-shadow border border-white">
                        <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="party-popper" class="w-12 h-12"></i>
                        </div>
                        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">כל הכבוד!</h1>
                        <p class="text-slate-600 mb-8">סיימת ללמוד את כל המילים!</p>
                        <button onClick={() => { localStorage.clear(); window.location.reload(); }} class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold btn-animate">התחל מחדש</button>
                    </div>
                </div>
            );

            return (
                <div class="h-full flex flex-col items-center p-4">
                    {/* Header: קטן יותר, ללא רווח מיותר */}
                    <div class="w-full max-w-lg flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <div class="p-1.5 bg-indigo-600 rounded-lg text-white"><i data-lucide="brain-circuit" class="w-5 h-5"></i></div>
                            <span class="font-extrabold text-lg text-indigo-950 tracking-tight">Vocab Master</span>
                        </div>
                        <div class="bg-indigo-950 text-white px-3 py-1.5 rounded-full text-xs font-bold">
                            {learnedWords.length} / {WORD_LIST.length}
                        </div>
                    </div>

                    {/* פס התקדמות: דק יותר */}
                    <div class="w-full max-w-lg h-1.5 bg-indigo-100 rounded-full mb-4 overflow-hidden">
                        <div class="h-full bg-indigo-500" style={{ width: `${(learnedWords.length / WORD_LIST.length) * 100}%` }}></div>
                    </div>

                    {/* חיפוש: פחות גובה */}
                    <div class="w-full max-w-lg relative mb-4">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input 
                            type="text" 
                            placeholder="חפש מילה..." 
                            class="w-full py-3 px-10 bg-white/70 backdrop-blur-sm rounded-xl outline-none text-base text-right border border-indigo-50 focus:border-indigo-200"
                            value={searchTerm}
                            onChange={(e) => { setSearchTerm(e.target.value); setCurrentIndex(0); }}
                        />
                    </div>

                    {/* כרטיסייה: גמישה (Flex-grow) כדי למלא את המסך בלי לגלול */}
                    <div class="w-full max-w-lg flex-grow relative perspective-1000">
                        {!currentWordData ? (
                            <div class="bg-white/90 p-16 rounded-3xl text-center h-full flex items-center justify-center font-bold text-slate-400">לא נמצאו מילים</div>
                        ) : (
                            <div 
                                class={`vocab-card w-full h-full bg-white rounded-3xl card-shadow p-6 flex flex-col items-center justify-center cursor-pointer relative ${isFlipped ? 'is-flipped' : ''}`}
                                onClick={() => setIsFlipped(!isFlipped)}
                            >
                                {/* חזית (אנגלית) */}
                                <div class="vocab-card-front h-full flex flex-col items-center justify-center">
                                    <span class="absolute top-6 left-6 text-[9px] font-bold text-indigo-200 uppercase tracking-widest">Amehtyst Level</span>
                                    <h2 class={`font-extrabold text-indigo-950 text-center ${getWordFontSize(currentWordData.word)}`}>
                                        {currentWordData.word}
                                    </h2>
                                    <div class="mt-6 flex items-center gap-2 text-indigo-400 animate-pulse-soft">
                                        <i data-lucide="eye" class="w-6 h-6" strokeWidth={2.5}></i>
                                        <span class="text-xs font-bold tracking-widest uppercase">לחץ לחשיפה</span>
                                    </div>
                                </div>

                                {/* גב (עברית) */}
                                <div class="vocab-card-back absolute inset-0 h-full w-full bg-indigo-950 rounded-3xl p-6 flex flex-col items-center justify-center text-white">
                                    <span class="absolute top-6 left-6 text-[9px] font-bold text-indigo-700 uppercase tracking-widest">Amehtyst Level</span>
                                    <div class="text-center w-full">
                                        <p class="text-5xl font-extrabold mb-3 text-sky-300">{currentWordData.translation}</p>
                                        <div class="inline-flex items-center gap-2 bg-indigo-900 px-4 py-2 rounded-xl border border-indigo-800">
                                            <i data-lucide="info" class="w-4 h-4 text-indigo-400"></i>
                                            <span class="text-lg font-bold text-indigo-200">{currentWordData.phonetic}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* כפתורי שליטה: צמודים לתחתית ומאוחדים למראה נקי */}
                    <div class="w-full max-w-lg mt-4 grid grid-cols-5 gap-3">
                        <button onClick={(e) => {e.stopPropagation(); handleMarkAsLearned();}} disabled={!currentWordData} class="col-span-2 py-4 bg-white text-emerald-600 rounded-xl font-bold text-base shadow active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50 border border-emerald-50">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                            יודע
                        </button>
                        <button onClick={(e) => {e.stopPropagation(); handleNext();}} disabled={!currentWordData} class="col-span-3 py-4 bg-indigo-600 text-white rounded-xl font-bold text-base shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                            מילה הבאה
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
