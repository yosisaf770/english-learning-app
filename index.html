            { word: "Regular", translation: "רגיל", phonetic: "רֶ-גְיוּ-לָר" },
            { word: "Report", translation: "דיווח", phonetic: "רִי-פּוֹרְט" },
            { word: "Science", translation: "מדע", phonetic: "סַאיי-אֶנְס" },
            { word: "Section", translation: "חלק", phonetic: "סֶק-שֶׁן" },
            { word: "Situation", translation: "מצב", phonetic: "סִי-טְשׁוּ-אֵי-שֶׁן" },
            { word: "Solution", translation: "פתרון", phonetic: "סוֹ-לוּ-שֶׁן" },
            { word: "Standard", translation: "סטנדרט", phonetic: "סְטֶנ-דֶרד" },
            { word: "Student", translation: "סטודנט", phonetic: "סְטוּ-דֶנְט" },
            { word: "Success", translation: "הצלחה", phonetic: "סַאק-סֶס" },
            { word: "Support", translation: "תמיכה", phonetic: "סַ-פּוֹרְט" },
            { word: "Teacher", translation: "מורה", phonetic: "טִי-טְשֶׁר" },
            { word: "Traffic", translation: "תנועה", phonetic: "טְרֶ-פִיק" },
            { word: "Update", translation: "עדכון", phonetic: "אֲפּ-דֵייט" },
            { word: "Various", translation: "מגוון", phonetic: "וֶ-רִי-אוּס" },
            { word: "Website", translation: "אתר", phonetic: "וֶוב-סַאייט" },
            { word: "Weight", translation: "משקל", phonetic: "וֵוייט" }
            // ניתן להוסיף כאן עוד מילים באותו פורמט עד ל-500
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showTranslation, setShowTranslation] = useState(false);
            const [learnedWords, setLearnedWords] = useState([]);
            const [sessionWords, setSessionWords] = useState([]);
            const [isFinished, setIsFinished] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('vocab_master_final_save') || '[]');
                setLearnedWords(saved);
                const remaining = WORD_LIST.filter(w => !saved.includes(w.word));
                setSessionWords(remaining);
                if (remaining.length === 0 && WORD_LIST.length > 0) setIsFinished(true);
                if(window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => { 
                if(window.lucide) window.lucide.createIcons(); 
            }, [showTranslation, isFinished, sessionWords]);

            const filteredWords = useMemo(() => {
                return sessionWords.filter(w => w.word.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [sessionWords, searchTerm]);

            const currentWordData = filteredWords[currentIndex];

            const handleNext = () => {
                setShowTranslation(false);
                if (currentIndex < filteredWords.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    setCurrentIndex(0);
                }
            };

            const handleMarkAsLearned = () => {
                if (!currentWordData) return;
                const newLearned = [...learnedWords, currentWordData.word];
                setLearnedWords(newLearned);
                localStorage.setItem('vocab_master_final_save', JSON.stringify(newLearned));
                const updated = sessionWords.filter(w => w.word !== currentWordData.word);
                setSessionWords(updated);
                setShowTranslation(false);
                if (updated.length === 0) setIsFinished(true);
                else if (currentIndex >= updated.length) setCurrentIndex(0);
            };

            if (isFinished) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-md w-full border border-slate-100">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="party-popper" style={{width: 48, height: 48}}></i>
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 mb-4">אלופים!</h1>
                        <p className="text-slate-500 mb-8 font-medium">סיימתם ללמוד את כל המילים!</p>
                        <button onClick={() => { localStorage.removeItem('vocab_master_final_save'); window.location.reload(); }} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-bold shadow-lg">התחל מחדש</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center bg-slate-50">
                    {/* כותרת */}
                    <div className="max-w-xl w-full flex justify-between items-center mb-6">
                        <div className="flex items-center gap-2 text-indigo-600">
                            <i data-lucide="book-open" style={{width: 28, height: 28}}></i>
                            <span className="font-black text-xl tracking-tight">Vocab Pro 500</span>
                        </div>
                        <div className="bg-white px-4 py-2 rounded-full shadow-sm text-sm font-bold border border-slate-100">
                            {learnedWords.length} / {WORD_LIST.length}
                        </div>
                    </div>

                    {/* פס התקדמות */}
                    <div className="max-w-xl w-full h-2.5 bg-slate-200 rounded-full mb-8 overflow-hidden">
                        <div className="h-full bg-indigo-500 transition-all duration-1000" style={{ width: `${(learnedWords.length / WORD_LIST.length) * 100}%` }}></div>
                    </div>

                    {/* חיפוש */}
                    <div className="max-w-xl w-full relative mb-8">
                        <input 
                            type="text" 
                            placeholder="חפש מילה ספציפית..." 
                            className="w-full py-5 px-6 bg-white rounded-[2rem] shadow-sm border-none outline-none text-lg focus:ring-2 focus:ring-indigo-100 transition-all text-center"
                            value={searchTerm}
                            onChange={(e) => { setSearchTerm(e.target.value); setCurrentIndex(0); }}
                        />
                    </div>

                    {/* כרטיסייה */}
                    <div className="max-w-xl w-full">
                        {!currentWordData ? (
                            <div className="bg-white p-16 rounded-[3rem] text-center shadow-lg text-slate-400 font-bold">לא נמצאו מילים תואמות</div>
                        ) : (
                            <div 
                                className={`bg-white rounded-[3rem] card-shadow p-10 min-h-[480px] flex flex-col items-center justify-center cursor-pointer transition-all duration-300 relative ${showTranslation ? 'ring-4 ring-indigo-100' : 'hover:-translate-y-1'}`}
                                onClick={() => setShowTranslation(!showTranslation)}
                            >
                                <span className="absolute top-8 right-10 text-[10px] font-black text-slate-300 tracking-[0.2em] uppercase">Level: Intermediate</span>
                                
                                <h2 className={`font-black text-slate-800 transition-all duration-500 text-center ${showTranslation ? 'text-5xl mb-8' : 'text-8xl'}`}>
                                    {currentWordData.word}
                                </h2>

                                {showTranslation && (
                                    <div className="text-center w-full animate-in fade-in slide-in-from-bottom-4 duration-500">
                                        <div className="h-1 w-12 bg-indigo-100 rounded-full mx-auto mb-8"></div>
                                        <p className="text-5xl font-black text-indigo-600 mb-4">{currentWordData.translation}</p>
                                        <div className="inline-flex items-center gap-2 bg-slate-50 px-6 py-3 rounded-2xl border border-slate-100">
                                            <i data-lucide="volume-2" style={{width: 18, height: 18}} className="text-indigo-300"></i>
                                            <span className="text-xl font-bold text-slate-500 tracking-wide">{currentWordData.phonetic}</span>
                                        </div>
                                    </div>
                                )}

                                {!showTranslation && (
                                    <div className="mt-16 flex flex-col items-center gap-4 text-indigo-400 animate-pulse-soft">
                                        <i data-lucide="eye" style={{width: 48, height: 48}} strokeWidth={2.5}></i>
                                        <span className="text-xs font-black tracking-widest uppercase">לחץ לחשיפה</span>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* כפתורי שליטה */}
                    <div className="max-w-xl w-full mt-10 grid grid-cols-2 gap-6">
                        <button onClick={(e) => {e.stopPropagation(); handleMarkAsLearned();}} disabled={!currentWordData} className="py-6 bg-white text-emerald-600 rounded-[2.5rem] border-2 border-emerald-50 font-black text-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <i data-lucide="check-circle" style={{width: 24, height: 24}}></i>
                            יודע
                        </button>
                        <button onClick={(e) => {e.stopPropagation(); handleNext();}} disabled={!currentWordData} className="py-6 bg-indigo-600 text-white rounded-[2.5rem] font-black text-xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                            הבא
                            <i data-lucide="chevron-right" style={{width: 24, height: 24}}></i>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
