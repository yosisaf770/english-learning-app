                    {/* Footer Buttons */}
                    <div className="w-full max-w-lg grid grid-cols-5 gap-3 h-16 shrink-0 mb-1">
                        <button onClick={(e) => {e.stopPropagation(); handleMarkAsLearned();}} disabled={!currentWordData} className="col-span-2 bg-emerald-500 text-white rounded-2xl font-black text-base shadow-lg btn-animate flex items-center justify-center gap-2 disabled:opacity-30 border-b-4 border-emerald-700">
                            <Icon name="checkCircle" size={24} />
                            יודע
                        </button>
                        <button onClick={(e) => {e.stopPropagation(); handleNext();}} disabled={!currentWordData} className="col-span-3 bg-indigo-500 text-white rounded-2xl font-black text-lg shadow-lg btn-animate flex items-center justify-center gap-2 disabled:opacity-30 border-b-4 border-indigo-700">
                            הבא
                            <Icon name="chevronRight" size={24} />
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
