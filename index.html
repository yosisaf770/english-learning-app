        ];

        // Shuffle Function
        const shuffle = (arr) => {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        // Simple SVG Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" />,
                search: <g fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
                eye: <g fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
                info: <g fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
                checkCircle: <g fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                chevronRight: <polyline points="9 18 15 12 9 6" fill="none" stroke="currentColor" strokeWidth="2" />,
                party: <path d="M5.8 11.3 2 22l10.7-3.8M4 14.8 9.2 10M12.6 19.4 17.4 14.2M17.4 14.2 22 5.8 11.3 2 5.8 11.3" fill="none" stroke="currentColor" strokeWidth="2" />
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name]}
                </svg>
            );
        };

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [learnedWords, setLearnedWords] = useState([]);
            const [sessionWords, setSessionWords] = useState([]);
            const [isFinished, setIsFinished] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('vocab_master_final_v600') || '[]');
                setLearnedWords(saved);
                const remaining = MASTER_WORD_LIST.filter(w => !saved.includes(w.word));
                setSessionWords(shuffle(remaining));
                if (remaining.length === 0 && MASTER_WORD_LIST.length > 0) setIsFinished(true);
            }, []);

            const filteredWords = useMemo(() => {
                return sessionWords.filter(w => w.word.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [sessionWords, searchTerm]);

            const currentWordData = filteredWords[currentIndex];

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    if (currentIndex < filteredWords.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                    } else {
                        setCurrentIndex(0);
                        setSessionWords(prev => shuffle(prev));
                    }
                }, 100);
            };

            const handleMarkAsLearned = () => {
                if (!currentWordData) return;
                const newLearned = [...learnedWords, currentWordData.word];
                setLearnedWords(newLearned);
                localStorage.setItem('vocab_master_final_v600', JSON.stringify(newLearned));
                
                const updated = sessionWords.filter(w => w.word !== currentWordData.word);
                setSessionWords(updated);
                setIsFlipped(false);
                if (updated.length === 0) {
                    setIsFinished(true);
                } else if (currentIndex >= updated.length) {
                    setCurrentIndex(0);
                }
            };

            const getFontSize = (word = "") => {
                if (word.length > 14) return 'text-2xl';
                if (word.length > 11) return 'text-4xl';
                if (word.length > 8) return 'text-5xl';
                return 'text-6xl';
            };

            if (isFinished) return (
                <div className="h-full flex items-center justify-center p-6 text-center">
                    <div className="bg-white/10 backdrop-blur-md p-10 rounded-[2.5rem] border border-white/20 shadow-2xl w-full max-w-sm">
                        <div className="w-20 h-20 bg-emerald-400 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                            <Icon name="party" size={40} />
                        </div>
                        <h1 className="text-3xl font-extrabold text-white mb-2">מדהים!</h1>
                        <p className="text-white/80 mb-8 font-medium italic">השלמת את לימוד כל המילים!</p>
                        <button onClick={() => { localStorage.removeItem('vocab_master_final_v600'); window.location.reload(); }} className="w-full py-4 bg-white text-indigo-700 rounded-2xl font-black btn-animate shadow-xl">התחל מהתחלה</button>
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col items-center p-4">
                    {/* Header */}
                    <div className="w-full max-w-lg flex flex-col gap-2 mb-3 shrink-0">
                        <div className="flex justify-between items-center px-1">
                            <div className="flex items-center gap-2">
                                <div className="p-2 bg-white/20 rounded-xl text-white glass"><Icon name="zap" size={20} className="text-yellow-300" /></div>
                                <span className="font-black text-xl text-white tracking-tighter uppercase">Vocab 600+</span>
                            </div>
                            <div className="glass text-white px-3 py-1 rounded-full text-xs font-bold border border-white/10">
                                {learnedWords.length} / {MASTER_WORD_LIST.length}
                            </div>
                        </div>
                        <div className="w-full h-1.5 bg-black/10 rounded-full overflow-hidden">
                            <div className="h-full bg-yellow-400 transition-all duration-700" style={{ width: `${(learnedWords.length / MASTER_WORD_LIST.length) * 100}%` }}></div>
                        </div>
                    </div>

                    {/* Search */}
                    <div className="w-full max-w-lg relative mb-3 shrink-0">
                        <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-white/50" />
                        <input 
                            type="text" 
                            placeholder="חפש מילה..." 
                            className="w-full py-2.5 px-10 bg-white/10 backdrop-blur-sm rounded-xl outline-none text-base text-right text-white placeholder-white/40 border border-white/20 focus:bg-white/20"
                            value={searchTerm}
                            onChange={(e) => { setSearchTerm(e.target.value); setCurrentIndex(0); }}
                        />
                    </div>

                    {/* Card */}
                    <div className="w-full max-w-lg flex-grow relative perspective-1000 mb-3 h-0">
                        {!currentWordData ? (
                            <div className="bg-white/10 p-10 rounded-[2.5rem] border border-white/20 h-full flex flex-col items-center justify-center text-white/50">
                                <Icon name="search" size={60} className="mb-4 opacity-20" />
                                <span className="font-bold">לא נמצאו מילים</span>
                            </div>
                        ) : (
                            <div 
                                className={`vocab-card w-full h-full cursor-pointer ${isFlipped ? 'is-flipped' : ''}`}
                                onClick={() => setIsFlipped(!isFlipped)}
                            >
                                <div className="vocab-card-front bg-white shadow-2xl">
                                    <span className="absolute top-8 left-1/2 -translate-x-1/2 text-[9px] font-black text-indigo-100 uppercase tracking-[0.4em]">Essential Vocabulary</span>
                                    <h2 className={`font-black text-slate-800 text-center leading-tight px-6 ${getFontSize(currentWordData.word)}`}>
                                        {currentWordData.word}
                                    </h2>
                                    <div className="mt-8 flex flex-col items-center gap-2 text-indigo-400 animate-pulse-soft">
                                        <Icon name="eye" size={40} />
                                        <span className="text-[10px] font-black tracking-widest uppercase">לחץ לתרגום</span>
                                    </div>
                                </div>

                                <div className="vocab-card-back bg-slate-900 shadow-2xl overflow-hidden">
                                    <div className="text-center w-full px-4">
                                        <p className="text-4xl font-black mb-6 text-yellow-400 drop-shadow-lg">{currentWordData.translation}</p>
                                        <div className="inline-flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/10">
                                            <Icon name="info" size={20} className="text-indigo-400" />
                                            <span className="text-2xl font-bold tracking-wide text-white">{currentWordData.phonetic}</span>
                                        </div>
                                    </div>
                                    <div className="absolute bottom-6 left-0 right-0 text-center opacity-30">
                                        <span className="text-[10px] font-bold text-white tracking-widest uppercase">Vocab Pro 600</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer Buttons */}
                    <div className="w-full max-w-lg grid grid-cols-5 gap-3 h-16 shrink-0 mb-1">
                        <button onClick={(e) => {e.stopPropagation(); handleMarkAsLearned();}} disabled={!currentWordData} className="col-span-2 bg-emerald-500 text-white rounded-2xl font-black text-base shadow-lg btn-animate flex items-center justify-center gap-2 disabled:opacity-30 border-b-4 border-emerald-700">
                            <Icon name="checkCircle" size={24} />
                            יודע
                        </button>
                        <button onClick={(e) => {e.stopPropagation(); handleNext();}} disabled={!currentWordData} className="col-span-3 bg-indigo-500 text-white rounded-2xl font-black text-lg shadow-lg btn-animate flex items-center justify-center gap-2 disabled:opacity-30 border-b-4 border-indigo-700">
                            הבא
                            <Icon name="chevronRight" size={24} />
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
